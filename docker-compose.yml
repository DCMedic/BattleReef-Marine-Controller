services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: battlereef-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - battlereef_postgres_data:/var/lib/postgresql/data
      - ./ops/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: battlereef-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./ops/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -p 1883 -t healthcheck -m ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: python:3.12-slim
    container_name: battlereef-backend
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./shared:/shared
    command:
      - sh
      - -c
      - |
          pip install --upgrade pip && \
          pip install fastapi "uvicorn[standard]" sqlalchemy "psycopg[binary]" pydantic pydantic-settings paho-mqtt && \
          uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started

  simulator:
    build:
      context: .
      dockerfile: tools/simulator/Dockerfile
    container_name: battlereef-simulator
    restart: unless-stopped
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      MQTT_CLIENT_ID: battlereef-simulator
      PUBLISH_INTERVAL_SECONDS: 5
    command: ["python", "/app/publish_telemetry.py"]
    depends_on:
      mosquitto:
        condition: service_started

  device-listener:
    build:
      context: .
      dockerfile: tools/simulator/Dockerfile
    container_name: battlereef-device-listener
    restart: unless-stopped
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      MQTT_CLIENT_ID: battlereef-device-listener
    command: ["python", "/app/device_command_listener.py"]
    depends_on:
      mosquitto:
        condition: service_started

volumes:
  battlereef_postgres_data:
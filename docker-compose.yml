version: "3.9"

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: battlereef-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - battlereef_postgres_data:/var/lib/postgresql/data
      - ./ops/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: battlereef-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./ops/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 1883 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: python:3.12-slim
    container_name: battlereef-backend
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./shared:/shared
    command: >
      sh -c "pip install --upgrade pip &&
             pip install fastapi uvicorn[standard] sqlalchemy psycopg[binary] pydantic pydantic-settings &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started

volumes:
  battlereef_postgres_data: